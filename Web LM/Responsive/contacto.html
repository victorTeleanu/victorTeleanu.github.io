<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Contacto</title>
        <link rel="stylesheet" href="styles.css">
        <!--<link rel="stylesheet" href="styles2.css"> -->
    </head>
    <body>
        <header>
        <nav>
            <ul>
                <li><a href="index.html">INDEX</a></li>
                <li><a href="destinos.html">DESTINOS</a></li>
            </ul>
        </nav>
        </header>

        <section>

            <form action="#" method="post">
                <h1>Formulario de Opinión</h1>
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" name="nombre" required>
                <br>
                <label for="email">Correo Electrónico:</label>
                <input type="email" id="email" name="email" required>
                <br>
                <label for="opinion">Opinión:</label>
                <textarea id="opinion" name="opinion" rows="4" required></textarea>
                <br>
                <label for="calificacion">Calificación:</label>
                <select id="calificacion" name="calificacion" required>
                    <option value="" disabled selected>Selecciona una calificación</option>
                    <option value="excelente">Excelente</option>
                    <option value="bueno">Bueno</option>
                    <option value="regular">Regular</option>
                    <option value="malo">Malo</option>
                </select>

                <br>

                <input type="submit" value="Enviar Opinión">
            </form>
        </section>

        <audio autoplay loop>
            <source src="Archivos/extenz-Kalon.mp3" type="audio/mp3">
            Tu navegador no soporta el elemento de audio.
        </audio>
        
        <footer>
            <p>© Victor Teleanu - Derechos reservados.
                <a href="sindicacion.rss"><img class="img_rss" src="Archivos/rss.png" alt="Icono RSS"></a>
            </p>
        </footer>
    </body>
    
</html>
